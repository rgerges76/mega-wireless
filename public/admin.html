<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mega Wireless Admin</title><link rel="stylesheet" href="assets/style.css"></head>
<body class="admin-body"><div id="login" class="modal open"><div class="modal-card login-card"><h2>Owner / Manager Login</h2><input id="email" type="email" placeholder="Email"><br><br><input id="password" type="password" placeholder="Password"><br><br><button class="btn" onclick="signIn()">Login</button><p id="msg"></p></div></div>
<div class="admin-main"><div class="toolbar"><div><h1>Inventory & Website Products</h1><p class="lead">Production database</p></div><button class="btn" onclick="openEditor()">Add Product</button></div><div id="content"></div></div>
<div id="editModal" class="modal"><div class="modal-card"><h2>Product</h2><div class="form-grid">
<label>Name<input id="p_name"></label><label>SKU<input id="p_sku"></label><label>Category<input id="p_category"></label><label>Quantity<input id="p_quantity" type="number"></label><label>Cost<input id="p_cost" type="number" step=".01"></label><label>Price<input id="p_price" type="number" step=".01"></label><label>Minimum Price<input id="p_min" type="number" step=".01"></label><label>Low Stock Threshold<input id="p_low" type="number" value="5"></label><label>Image URL<input id="p_image"></label><label>Website Visible<select id="p_visible"><option value="true">Yes</option><option value="false">No</option></select></label></div><br><button class="btn" onclick="saveProduct()">Save</button> <button class="btn gray" onclick="editModal.classList.remove('open')">Close</button></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script>
const sb=supabase.createClient(MW_CONFIG.SUPABASE_URL,MW_CONFIG.SUPABASE_ANON_KEY);let rows=[],editing=null;
async function signIn(){const {error}=await sb.auth.signInWithPassword({email:email.value,password:password.value});msg.textContent=error?error.message:'';if(!error){login.classList.remove('open');load()}}
async function load(){const {data,error}=await sb.from('products').select('*').order('name');if(error)return alert(error.message);rows=data;content.innerHTML=`<div class="table-wrap"><table class="data-table"><tr><th>Name</th><th>Qty</th><th>Cost</th><th>Price</th><th>Min</th><th>Website</th><th></th></tr>${rows.map((r,i)=>`<tr><td>${r.name}</td><td>${r.quantity}</td><td>$${r.cost}</td><td>$${r.price}</td><td>$${r.minimum_price}</td><td>${r.website_visible}</td><td><button class="small edit" onclick="edit(${i})">Edit</button></td></tr>`).join('')}</table></div>`}
function openEditor(){editing=null;['name','sku','category','quantity','cost','price','min','image'].forEach(x=>document.getElementById('p_'+x).value='');p_low.value=5;p_visible.value='true';editModal.classList.add('open')}
function edit(i){editing=rows[i];p_name.value=editing.name;p_sku.value=editing.sku||'';p_category.value=editing.category;p_quantity.value=editing.quantity;p_cost.value=editing.cost;p_price.value=editing.price;p_min.value=editing.minimum_price;p_low.value=editing.low_stock_threshold;p_image.value=editing.image_url||'';p_visible.value=String(editing.website_visible);editModal.classList.add('open')}
async function saveProduct(){const payload={name:p_name.value,sku:p_sku.value||null,category:p_category.value||'Accessories',quantity:+p_quantity.value||0,cost:+p_cost.value||0,price:+p_price.value||0,minimum_price:+p_min.value||0,low_stock_threshold:+p_low.value||5,image_url:p_image.value||null,website_visible:p_visible.value==='true'};let q=editing?sb.from('products').update(payload).eq('id',editing.id):sb.from('products').insert(payload);const {error}=await q;if(error)return alert(error.message);editModal.classList.remove('open');load()}
sb.auth.getSession().then(({data})=>{if(data.session){login.classList.remove('open');load()}});
</script></body></html>
