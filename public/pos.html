<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mega Wireless POS</title><link rel="stylesheet" href="assets/style.css">
<style>
body{background:#020715}.pos-shell{display:grid;grid-template-columns:1fr 360px;min-height:100vh}
.pos-main{padding:20px}.pos-side{border-left:1px solid #1a3e75;background:#061127;padding:20px;position:sticky;top:0;height:100vh;overflow:auto}
.pos-bar{display:flex;gap:10px;align-items:center;margin-bottom:15px}.pos-bar input{flex:1;padding:13px;border-radius:10px;border:1px solid #31588e;background:#030a18;color:white}
.product-grid-pos{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.product-pos{padding:14px;cursor:pointer}.product-pos:hover{border-color:#36b8ff}.product-pos .qty{color:#9fb1cd;font-size:12px}
.cart-row{display:grid;grid-template-columns:1fr 72px 75px 28px;gap:7px;align-items:center;border-bottom:1px solid #16335d;padding:10px 0}
.cart-row input{width:100%;padding:7px;background:#030a18;color:white;border:1px solid #294b7c;border-radius:7px}
.total{font-size:30px;font-weight:900;color:#ffbd35}.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:900px){.pos-shell{grid-template-columns:1fr}.pos-side{position:relative;height:auto}.product-grid-pos{grid-template-columns:repeat(2,1fr)}}
</style></head>
<body>
<div id="login" class="modal open"><div class="modal-card login-card"><h2>Staff Login</h2><input id="email" type="email" placeholder="Email"><br><br><input id="password" type="password" placeholder="Password"><br><br><button class="btn" onclick="signIn()">Login</button><p id="loginMsg"></p></div></div>
<div class="pos-shell">
<main class="pos-main"><div class="pos-bar"><h2>MEGA WIRELESS POS</h2><input id="search" placeholder="Search name / SKU / barcode"><label><input type="checkbox" id="taxEnabled" checked> Tax</label><button class="btn gray" onclick="clockIn()">Clock In</button></div><div id="products" class="product-grid-pos"></div></main>
<aside class="pos-side"><h2>Current Sale</h2><div id="cart"></div><p>Subtotal: <b id="subtotal">$0.00</b></p><p>Tax: <b id="tax">$0.00</b></p><p class="total">Total: <span id="total">$0.00</span></p><div class="pay-grid"><button class="btn" onclick="checkout('cash')">Cash</button><button class="btn" onclick="checkout('card')">Card</button></div><br><button class="btn gray" onclick="clearCart()">Clear</button><button class="btn gray" onclick="window.print()">Print Last Receipt</button></aside>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script>
<script>
const sb=supabase.createClient(MW_CONFIG.SUPABASE_URL,MW_CONFIG.SUPABASE_ANON_KEY);let products=[],cart=[];
const money=n=>'$'+Number(n||0).toFixed(2);
async function signIn(){const {error}=await sb.auth.signInWithPassword({email:email.value,password:password.value});loginMsg.textContent=error?error.message:'';if(!error){login.classList.remove('open');loadProducts()}}
async function loadProducts(){const {data,error}=await sb.from('products').select('*').eq('active',true).order('name');if(error)return alert(error.message);products=data;renderProducts()}
function renderProducts(){const q=search.value.toLowerCase();document.getElementById('products').innerHTML=products.filter(p=>[p.name,p.sku,p.barcode].join(' ').toLowerCase().includes(q)).map(p=>`<article class="card product-pos" onclick="add('${p.id}')"><b>${p.name}</b><p>${money(p.price)}</p><div class="qty">Qty: ${p.quantity}</div></article>`).join('')}
search.oninput=renderProducts;
function add(id){const p=products.find(x=>x.id===id);let r=cart.find(x=>x.product_id===id);if(r)r.quantity++;else cart.push({product_id:id,name:p.name,quantity:1,unit_price:Number(p.price),minimum_price:Number(p.minimum_price)});renderCart()}
function renderCart(){cartEl=document.getElementById('cart');cartEl.innerHTML=cart.map((r,i)=>`<div class="cart-row"><span>${r.name}</span><input type="number" min="1" value="${r.quantity}" onchange="cart[${i}].quantity=+this.value;renderCart()"><input type="number" step=".01" value="${r.unit_price}" onchange="cart[${i}].unit_price=+this.value;renderCart()"><button onclick="cart.splice(${i},1);renderCart()">×</button></div>`).join('');let sub=cart.reduce((s,r)=>s+r.quantity*r.unit_price,0),tx=taxEnabled.checked?sub*MW_CONFIG.TAX_RATE:0;subtotal.textContent=money(sub);tax.textContent=money(tx);total.textContent=money(sub+tx)}
taxEnabled.onchange=renderCart;
function clearCart(){cart=[];renderCart()}
async function checkout(method){if(!cart.length)return;let last4=null;if(method==='card'){last4=prompt('Last 4 card digits');if(!/^\\d{4}$/.test(last4||''))return alert('Enter 4 digits')}const items=cart.map(({product_id,quantity,unit_price})=>({product_id,quantity,unit_price}));const {data,error}=await sb.rpc('create_sale',{p_items:items,p_tax_enabled:taxEnabled.checked,p_payment:method,p_card_last4:last4,p_customer_id:null});if(error)return alert(error.message);alert('Sale completed: '+data);clearCart();loadProducts()}
async function clockIn(){const {data:{user}}=await sb.auth.getUser();if(!user)return;const {error}=await sb.from('time_entries').insert({employee_id:user.id});alert(error?error.message:'Clocked in')}
sb.auth.getSession().then(({data})=>{if(data.session){login.classList.remove('open');loadProducts()}});
</script></body></html>
