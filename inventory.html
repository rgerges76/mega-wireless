<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mega Wireless — POS Inventory Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
:root{--bg:#020715;--panel:#07142a;--line:#17345e;--text:#eef6ff;--muted:#9fb4d1;--blue:#1688ff;--gold:#ffbd35;--danger:#ff5a67;--ok:#26c281}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text)}
button,input,select{font:inherit}
.wrap{max-width:1450px;margin:auto;padding:18px}
.top{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:15px}
.top h1{font-size:24px;margin:0 auto 0 0}
.btn{border:1px solid var(--line);background:#0c2345;color:#fff;padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:700}
.btn.primary{background:var(--blue);border-color:var(--blue)}
.btn.gold{background:var(--gold);border-color:var(--gold);color:#111}
.btn.danger{background:#421520;border-color:#7f2433}
.btn:hover{filter:brightness(1.1)}
.controls{display:grid;grid-template-columns:2fr 1fr auto;gap:10px;margin-bottom:12px}
input,select{width:100%;border:1px solid var(--line);background:#061127;color:#fff;border-radius:9px;padding:11px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.stat{background:var(--panel);border:1px solid var(--line);padding:12px;border-radius:12px}
.stat b{font-size:22px;display:block;color:var(--gold)}
.table-wrap{overflow:auto;max-height:72vh}
table{border-collapse:collapse;width:100%;min-width:1200px}
th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;font-size:13px}
th{position:sticky;top:0;background:#0a1d3c;z-index:2}
td.num{text-align:right}
.low{color:#ff858f;font-weight:800}
.inactive{opacity:.5}
.actions{white-space:nowrap}
.actions button{padding:7px 9px;margin:2px;font-size:12px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);align-items:center;justify-content:center;padding:15px;z-index:10}
.modal.open{display:flex}
.dialog{width:min(850px,100%);max-height:93vh;overflow:auto;background:#07142a;border:1px solid #285287;border-radius:16px;padding:18px}
.dialog h2{margin-top:0}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.field label{display:block;color:var(--muted);font-size:12px;margin-bottom:5px}
.checks{display:flex;gap:22px;align-items:center;margin:14px 0}
.checks label{display:flex;gap:7px;align-items:center}
.checks input{width:auto}
.foot{display:flex;justify-content:flex-end;gap:8px;margin-top:15px}
.msg{padding:10px;border-radius:9px;margin-bottom:10px;display:none}
.msg.ok{display:block;background:#0d392d;color:#9af0ce}
.msg.err{display:block;background:#43131d;color:#ffb6bf}
.auth{position:fixed;inset:0;background:var(--bg);z-index:20;display:flex;align-items:center;justify-content:center}
.authbox{width:min(390px,92%);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:25px}
.authbox h2{text-align:center;margin-top:0}
.authbox input{margin:6px 0}
.authbox button{width:100%;margin-top:8px}
.small{font-size:12px;color:var(--muted)}
@media(max-width:800px){
 .controls{grid-template-columns:1fr}
 .summary{grid-template-columns:repeat(2,1fr)}
 .grid{grid-template-columns:1fr}
 .top h1{width:100%}
}
</style>
</head>
<body>

<div id="auth" class="auth">
  <div class="authbox">
    <h2>POS Inventory Admin</h2>
    <p class="small">Sign in with the same Supabase account used for the POS.</p>
    <div id="authMsg" class="msg"></div>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button class="btn primary" onclick="login()">Sign In</button>
  </div>
</div>

<div class="wrap">
  <div class="top">
    <h1>Mega Wireless — Inventory Admin</h1>
    <button class="btn" onclick="location.href='pos.html'">Back to POS</button>
    <button class="btn" onclick="location.href='admin.html'">Website Admin</button>
    <button class="btn" onclick="logout()">Logout</button>
    <button class="btn primary" onclick="openForm()">+ Add Product</button>
  </div>

  <div id="pageMsg" class="msg"></div>

  <div class="summary">
    <div class="stat"><span>Total Products</span><b id="sTotal">0</b></div>
    <div class="stat"><span>Total Units</span><b id="sUnits">0</b></div>
    <div class="stat"><span>Low Stock</span><b id="sLow">0</b></div>
    <div class="stat"><span>Inventory Cost</span><b id="sCost">$0.00</b></div>
  </div>

  <div class="controls">
    <input id="search" placeholder="Search name, SKU, barcode, quick code..." oninput="render()">
    <select id="categoryFilter" onchange="render()"><option value="">All Categories</option></select>
    <button class="btn" onclick="loadProducts()">Refresh</button>
  </div>

  <div class="card table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th><th>Category</th><th>SKU</th><th>Barcode</th><th>Quick Code</th>
          <th style="text-align:right">Qty</th><th style="text-align:right">Cost</th>
          <th style="text-align:right">Price</th><th style="text-align:right">Min Price</th>
          <th>Active</th><th>Website</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>

<div id="modal" class="modal">
  <div class="dialog">
    <h2 id="formTitle">Add Product</h2>
    <div class="grid">
      <div class="field"><label>Name *</label><input id="f_name"></div>
      <div class="field"><label>Category</label><input id="f_category" list="cats"><datalist id="cats"></datalist></div>
      <div class="field"><label>SKU</label><input id="f_sku"></div>
      <div class="field"><label>Barcode</label><input id="f_barcode"></div>
      <div class="field"><label>Quick Code</label><input id="f_quick_code"></div>
      <div class="field"><label>Quantity</label><input id="f_quantity" type="number" step="1" min="0" value="0"></div>
      <div class="field"><label>Cost</label><input id="f_cost" type="number" step="0.01" min="0" value="0"></div>
      <div class="field"><label>Selling Price</label><input id="f_price" type="number" step="0.01" min="0" value="0"></div>
      <div class="field"><label>Minimum Price</label><input id="f_minimum_price" type="number" step="0.01" min="0" value="0"></div>
      <div class="field"><label>Low Stock Alert At</label><input id="f_low_stock_threshold" type="number" step="1" min="0" value="5"></div>
    </div>
    <div class="checks">
      <label><input id="f_active" type="checkbox" checked> Active in POS</label>
      <label><input id="f_website_visible" type="checkbox"> Visible on Website</label>
    </div>
    <div class="foot">
      <button class="btn" onclick="closeForm()">Cancel</button>
      <button class="btn primary" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<div id="stockModal" class="modal">
  <div class="dialog" style="max-width:430px">
    <h2>Add Stock</h2>
    <p id="stockName"></p>
    <div class="field"><label>Quantity to add</label><input id="stockQty" type="number" min="1" step="1" value="1"></div>
    <div class="field" style="margin-top:10px"><label>New cost (optional)</label><input id="stockCost" type="number" min="0" step="0.01" placeholder="Leave blank to keep current cost"></div>
    <div class="foot">
      <button class="btn" onclick="closeStock()">Cancel</button>
      <button class="btn gold" onclick="saveStock()">Add Stock</button>
    </div>
  </div>
</div>

<script>
const cfg=window.MW_CONFIG||{};
const sb=supabase.createClient(cfg.SUPABASE_URL,cfg.SUPABASE_ANON_KEY);
let products=[], editingId=null, stockId=null;

const money=v=>`$${Number(v||0).toFixed(2)}`;
const val=id=>document.getElementById(id).value;
const num=id=>Number(val(id)||0);

function message(text,type='ok',target='pageMsg'){
 const el=document.getElementById(target); el.textContent=text; el.className='msg '+type;
 setTimeout(()=>{el.className='msg'},4000);
}
async function init(){
 const {data:{session}}=await sb.auth.getSession();
 if(session){document.getElementById('auth').style.display='none';await loadProducts();}
}
async function login(){
 const {error}=await sb.auth.signInWithPassword({email:val('email'),password:val('password')});
 if(error)return message(error.message,'err','authMsg');
 document.getElementById('auth').style.display='none'; await loadProducts();
}
async function logout(){await sb.auth.signOut();location.reload();}

async function loadProducts(){
 const {data,error}=await sb.from('products').select('*').order('name');
 if(error)return message(error.message,'err');
 products=data||[];
 rebuildCategories(); render();
}
function rebuildCategories(){
 const cats=[...new Set(products.map(p=>p.category).filter(Boolean))].sort();
 const f=document.getElementById('categoryFilter');
 const current=f.value;
 f.innerHTML='<option value="">All Categories</option>'+cats.map(c=>`<option>${escapeHtml(c)}</option>`).join('');
 f.value=current;
 document.getElementById('cats').innerHTML=cats.map(c=>`<option value="${escapeAttr(c)}">`).join('');
}
function render(){
 const q=val('search').trim().toLowerCase(), cat=val('categoryFilter');
 const list=products.filter(p=>{
   const hay=[p.name,p.sku,p.barcode,p.quick_code,p.category].join(' ').toLowerCase();
   return (!q||hay.includes(q))&&(!cat||p.category===cat);
 });
 document.getElementById('rows').innerHTML=list.map(p=>{
   const low=Number(p.quantity||0)<=Number(p.low_stock_threshold||5);
   return `<tr class="${p.active===false?'inactive':''}">
    <td><b>${escapeHtml(p.name||'')}</b></td>
    <td>${escapeHtml(p.category||'')}</td>
    <td>${escapeHtml(p.sku||'')}</td>
    <td>${escapeHtml(p.barcode||'')}</td>
    <td>${escapeHtml(p.quick_code||'')}</td>
    <td class="num ${low?'low':''}">${Number(p.quantity||0)}</td>
    <td class="num">${money(p.cost)}</td>
    <td class="num">${money(p.price)}</td>
    <td class="num">${money(p.minimum_price)}</td>
    <td>${p.active===false?'No':'Yes'}</td>
    <td>${p.website_visible?'Yes':'No'}</td>
    <td class="actions">
      <button class="btn" onclick="editProduct('${p.id}')">Edit</button>
      <button class="btn gold" onclick="openStock('${p.id}')">+ Stock</button>
      <button class="btn danger" onclick="toggleActive('${p.id}',${p.active===false})">${p.active===false?'Activate':'Deactivate'}</button>
    </td>
   </tr>`;
 }).join('');
 const totalUnits=products.reduce((s,p)=>s+Number(p.quantity||0),0);
 const low=products.filter(p=>p.active!==false&&Number(p.quantity||0)<=Number(p.low_stock_threshold||5)).length;
 const cost=products.reduce((s,p)=>s+Number(p.quantity||0)*Number(p.cost||0),0);
 document.getElementById('sTotal').textContent=products.length;
 document.getElementById('sUnits').textContent=totalUnits;
 document.getElementById('sLow').textContent=low;
 document.getElementById('sCost').textContent=money(cost);
}
function openForm(){
 editingId=null;document.getElementById('formTitle').textContent='Add Product';
 ['name','category','sku','barcode','quick_code'].forEach(k=>document.getElementById('f_'+k).value='');
 ['quantity','cost','price','minimum_price'].forEach(k=>document.getElementById('f_'+k).value='0');
 document.getElementById('f_low_stock_threshold').value='5';
 document.getElementById('f_active').checked=true;
 document.getElementById('f_website_visible').checked=false;
 document.getElementById('modal').classList.add('open');
}
function editProduct(id){
 const p=products.find(x=>x.id===id); if(!p)return;
 editingId=id;document.getElementById('formTitle').textContent='Edit Product';
 ['name','category','sku','barcode','quick_code','quantity','cost','price','minimum_price','low_stock_threshold']
   .forEach(k=>document.getElementById('f_'+k).value=p[k]??'');
 document.getElementById('f_active').checked=p.active!==false;
 document.getElementById('f_website_visible').checked=!!p.website_visible;
 document.getElementById('modal').classList.add('open');
}
function closeForm(){document.getElementById('modal').classList.remove('open')}
async function saveProduct(){
 const name=val('f_name').trim(); if(!name)return message('Product name is required.','err');
 const payload={
  name,category:val('f_category').trim()||null,sku:val('f_sku').trim()||null,
  barcode:val('f_barcode').trim()||null,quick_code:val('f_quick_code').trim()||null,
  quantity:num('f_quantity'),cost:num('f_cost'),price:num('f_price'),
  minimum_price:num('f_minimum_price'),low_stock_threshold:num('f_low_stock_threshold'),
  active:document.getElementById('f_active').checked,
  website_visible:document.getElementById('f_website_visible').checked
 };
 let result;
 if(editingId) result=await sb.from('products').update(payload).eq('id',editingId);
 else result=await sb.from('products').insert(payload);
 if(result.error)return message(result.error.message,'err');
 closeForm();message(editingId?'Product updated.':'Product added.');await loadProducts();
}
function openStock(id){
 const p=products.find(x=>x.id===id);if(!p)return;
 stockId=id;document.getElementById('stockName').textContent=`${p.name} — Current quantity: ${Number(p.quantity||0)}`;
 document.getElementById('stockQty').value=1;document.getElementById('stockCost').value='';
 document.getElementById('stockModal').classList.add('open');
}
function closeStock(){document.getElementById('stockModal').classList.remove('open')}
async function saveStock(){
 const p=products.find(x=>x.id===stockId); if(!p)return;
 const add=Number(val('stockQty')||0); if(add<=0)return message('Enter a quantity greater than zero.','err');
 const update={quantity:Number(p.quantity||0)+add};
 const c=val('stockCost').trim(); if(c!=='')update.cost=Number(c);
 const {error}=await sb.from('products').update(update).eq('id',stockId);
 if(error)return message(error.message,'err');
 closeStock();message('Stock added successfully.');await loadProducts();
}
async function toggleActive(id,isInactive){
 const {error}=await sb.from('products').update({active:isInactive}).eq('id',id);
 if(error)return message(error.message,'err');
 await loadProducts();
}
function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function escapeAttr(s){return escapeHtml(s)}
init();
</script>
</body>
</html>
