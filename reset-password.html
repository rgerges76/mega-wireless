<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reset Password | Mega Wireless</title><link rel="stylesheet" href="assets/style.css"><style>.reset-wrap{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at top,#0b2b61,#020715 58%)}.reset-card{width:min(520px,100%);padding:28px}.reset-card input{width:100%;padding:13px;border-radius:9px;border:1px solid #31588e;background:#030a18;color:#fff;margin:8px 0 14px}.reset-card p{color:#a9bddb}</style></head><body><main class="reset-wrap"><section class="card reset-card"><h1>Reset Password</h1><p>Enter a new password for your Mega Wireless account.</p><label>New Password<input id="newPassword" type="password" minlength="8" autocomplete="new-password"></label><label>Confirm Password<input id="confirmPassword" type="password" minlength="8" autocomplete="new-password"></label><button class="btn" onclick="updatePassword()">Save New Password</button><p id="status"></p></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script>const sb=supabase.createClient(MW_CONFIG.SUPABASE_URL,MW_CONFIG.SUPABASE_ANON_KEY);async function updatePassword(){const p1=newPassword.value,p2=confirmPassword.value;status.textContent='';if(p1.length<8){status.textContent='Password must be at least 8 characters.';return}if(p1!==p2){status.textContent='Passwords do not match.';return}const {error}=await sb.auth.updateUser({password:p1});if(error){status.textContent=error.message}else{status.textContent='Password updated successfully. Redirecting...';setTimeout(()=>location.href='/admin.html',1800)}}</script></body></html>
