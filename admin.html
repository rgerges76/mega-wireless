<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mega Admin</title><link rel="stylesheet" href="assets/css/app.css"></head><body><div id="login" class="modal open"><div class="modal-card" style="max-width:420px"><h2>Admin Login</h2><input id="pin" class="search" type="password"><br><br><button class="btn blue" onclick="loginNow()">Login</button></div></div><div class="admin-layout"><aside class="sidebar"><h2>MEGA Admin</h2><button class="active" onclick="showTab('phones',this)">Website Phones</button><button onclick="showTab('speakers',this)">Speakers</button><button onclick="showTab('carriers',this)">Carrier Plans</button><button onclick="showTab('repairs',this)">Repair Prices</button><button onclick="showTab('products',this)">POS Products</button><button onclick="showTab('employees',this)">Employees</button><button onclick="showTab('store',this)">Store / Password / Hours</button><button onclick="location.href='index.html'">Website</button><button onclick="location.href='pos.html'">POS</button><button onclick="exportData()">Export Backup</button><input id="importFile" type="file" hidden onchange="importData(event)"><button onclick="importFile.click()">Import Backup</button></aside><main class="content"><div class="toolbar"><h1 id="title">Website Phones</h1><button class="btn blue" onclick="addCurrent()">Add New</button></div><div id="view"></div></main></div><div id="editModal" class="modal"><div class="modal-card"><div class="toolbar"><h2 id="modalTitle">Edit</h2><button class="btn" onclick="closeModal()">Close</button></div><div id="form"></div></div></div><script src="assets/js/store.js"></script><script>let data,current='phones',editing=null;(async()=>{data=await MW.getData();render()})();function admin(){return data.employees.find(e=>e.role==='admin')}function loginNow(){if(pin.value===admin().pin)login.classList.remove('open');else alert('Wrong PIN')}function showTab(t,b){current=t;document.querySelectorAll('.sidebar button').forEach(x=>x.classList.remove('active'));b.classList.add('active');render()}function render(){title.textContent=current==='store'?'Store Settings':current;if(current==='store')return renderStore();const rows=data[current]||[],h=Object.keys(rows[0]||{name:''}).filter(k=>k!=='permissions');view.innerHTML=`<div class="table-wrap"><table><tr>${h.map(x=>`<th>${x}</th>`).join('')}<th>Actions</th></tr>${rows.map((r,i)=>`<tr>${h.map(x=>`<td>${Array.isArray(r[x])?r[x].join(', '):r[x]}</td>`).join('')}<td><button class="small-btn edit" onclick="editRow(${i})">Edit</button> <button class="small-btn delete" onclick="delRow(${i})">Delete</button></td></tr>`).join('')}</table></div>`}function renderStore(){const s=data.store;view.innerHTML=`<div class="card"><div class="form-grid"><input id="st_name" value="${s.name}"><input id="st_phone" value="${s.phone}"><input id="st_email" value="${s.email}"><input id="st_address" value="${s.address}">${Object.entries(s.hours).map(([d,h])=>`<input id="h_${d}" value="${h}">`).join('')}<input id="admin_pin" value="${admin().pin}"></div><br><button class="btn blue" onclick="saveStore()">Save</button></div>`}function saveStore(){data.store.name=st_name.value;data.store.phone=st_phone.value;data.store.email=st_email.value;data.store.address=st_address.value;Object.keys(data.store.hours).forEach(d=>data.store.hours[d]=document.getElementById('h_'+d).value);admin().pin=admin_pin.value;MW.saveData(data);alert('Saved')}function fields(){return{phones:['name','storage','price','oldPrice','stock','image','featured'],speakers:['name','price','stock','image'],carriers:['name','starting','image'],repairs:['brand','model','service','price','cost','time','warranty'],products:['name','barcode','cost','price','minimum','qty'],employees:['name','pin','role','permissions']}[current]}function addCurrent(){editing=null;openEditor({})}function editRow(i){editing=i;openEditor(data[current][i])}function delRow(i){if(confirm('Delete?')){data[current].splice(i,1);MW.saveData(data);render()}}function openEditor(o){editModal.classList.add('open');form.innerHTML=`<div class="form-grid">${fields().map(f=>`<label>${f}<input id="f_${f}" value="${Array.isArray(o[f])?o[f].join(','):o[f]??''}"></label>`).join('')}</div><br><button class="btn blue" onclick="saveRow()">Save</button>`}function closeModal(){editModal.classList.remove('open')}function saveRow(){const o=editing===null?{id:MW.uid(current[0])}:{...data[current][editing]};fields().forEach(f=>{let v=document.getElementById('f_'+f).value;if(['price','oldPrice','stock','starting','cost','minimum','qty'].includes(f))v=Number(v);if(f==='featured')v=v==='true'||v==='1';if(f==='permissions')v=v.split(',');o[f]=v});if(editing===null)data[current].push(o);else data[current][editing]=o;MW.saveData(data);closeModal();render()}function exportData(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)]));a.download='mega-wireless-backup.json';a.click()}function importData(e){const r=new FileReader();r.onload=()=>{data=JSON.parse(r.result);MW.saveData(data);render()};r.readAsText(e.target.files[0])}</script></body></html>
