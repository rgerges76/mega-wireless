<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mega Admin</title><link rel="stylesheet" href="assets/css/site.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script></head><body><div class="admin"><div id="login" class="card login-box"><h1>Secure Admin Login</h1><p class="notice">This page never stores passwords in browser files. Login is handled by Supabase Auth.</p><input id="email" class="field" type="email" placeholder="Email"><input id="password" class="field" type="password" placeholder="Password"><button class="btn blue" onclick="signIn()">Sign In</button></div><div id="panel" class="hidden"><div class="nav"><div class="wrap"><div class="brand">MEGA ADMIN</div><button class="btn" onclick="signOut()">Sign Out</button></div></div><h1>Products</h1><p class="notice">Customer records are never exposed here unless your role permits them. All write access is protected by Row Level Security.</p><div id="products"></div></div></div><script>
const sb=supabase.createClient(MEGA_CONFIG.SUPABASE_URL,MEGA_CONFIG.SUPABASE_ANON_KEY);
async function signIn(){const {error}=await sb.auth.signInWithPassword({email:email.value,password:password.value});if(error)return alert(error.message);showPanel()}
async function signOut(){await sb.auth.signOut();location.reload()}
async function showPanel(){login.classList.add('hidden');panel.classList.remove('hidden');const {data,error}=await sb.from('products').select('id,name,category,price,minimum_price,quantity,is_active').order('name');if(error)return products.innerHTML='<div class="notice">'+error.message+'</div>';products.innerHTML='<table class="table"><tr><th>Name</th><th>Category</th><th>Price</th><th>Minimum</th><th>Qty</th><th>Active</th></tr>'+data.map(x=>`<tr><td>${x.name}</td><td>${x.category}</td><td>$${x.price}</td><td>$${x.minimum_price}</td><td>${x.quantity}</td><td>${x.is_active}</td></tr>`).join('')+'</table>'}
sb.auth.getSession().then(({data})=>{if(data.session)showPanel()});
</script></body></html>
