<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mega Wireless Admin Demo</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script defer src="assets/js/admin.js"></script>
</head>
<body class="admin-body">
  <section class="admin-panel">
    <h1>Mega Wireless Daily Deals Admin</h1>
    <p>This demo saves deals in your browser using localStorage. For a live website, connect this to WordPress, Wix CMS, Firebase, Supabase, or a custom backend.</p>

    <form id="dealForm">
      <input id="dealTitle" placeholder="Deal title, e.g. iPhone 11 Unlocked" required />
      <input id="dealPrice" placeholder="Price, e.g. $120" required />
      <input id="dealNote" placeholder="Note, e.g. Today only" required />
      <button class="btn primary" type="submit">Add Deal</button>
    </form>

    <div id="adminDeals"></div>
    <a class="btn ghost" href="index.html">View Website</a>
  </section>
</body>
</html>
