<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mega Wireless Admin</title><link rel="stylesheet" href="assets/style.css"></head><body class="admin-body">
<div id="login" class="modal open"><div class="modal-card login-card"><h2>Admin Login</h2>
<input id="email" type="email" style="width:100%;padding:13px;background:#030a18;color:#fff;border:1px solid #294b7c;border-radius:9px" placeholder="Email">
<br><br>
<input id="password" type="password" style="width:100%;padding:13px;background:#030a18;color:#fff;border:1px solid #294b7c;border-radius:9px" placeholder="Password">
<br><br>
<div id="loginError" style="min-height:22px;color:#ffbd35;font-weight:700;margin-bottom:10px"></div><button class="btn" onclick="login()">Login</button></div></div>
<div class="admin-shell"><aside class="sidebar"><h2>MEGA Admin</h2><button class="active" onclick="switchTab('phones',this)">Phones & Prices</button><button onclick="switchTab('offers',this)">Homepage Offers</button><button onclick="switchTab('announcement',this)">New Owner Banner</button><button onclick="switchTab('speakers',this)">Speakers</button><button onclick="switchTab('carriers',this)">Carrier Plans</button><button onclick="switchTab('repairs',this)">Repair Prices</button><button onclick="switchTab('repairPromotions',this)">HDMI Repair Promo</button><button onclick="switchTab('ticker',this)">Moving Ticker</button><button onclick="switchTab('store',this)">Store / Password / Hours</button><button onclick="location.href='index.html'">Open Website</button><button onclick="exportBackup()">Export Backup</button><button onclick="document.getElementById('importFile').click()">Import Backup</button><input id="importFile" type="file" accept=".json" hidden onchange="importBackup(event)"></aside>
<main class="admin-main"><div class="toolbar"><div><h1 id="title">Phones & Prices</h1><p class="lead">Edit prices, offers and website content.</p></div><button class="btn" onclick="addNew()">Add New</button></div><div id="content"></div></main></div>
<div id="editModal" class="modal"><div class="modal-card"><div class="toolbar"><h2>Edit Item</h2><button class="btn gray" onclick="closeEditor()">Close</button></div><div id="form"></div></div></div>
<script src="assets/admin.js"></script></body></html>
