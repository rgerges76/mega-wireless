<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mega Admin</title><link rel="stylesheet" href="assets/css/style.css"><style>body{background:#07101f}.admin{max-width:1180px;margin:0 auto;padding:60px 18px}.login{max-width:420px;margin:80px auto}.panel{background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:26px;padding:24px;margin-bottom:20px}.row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:10px 0}input,select,textarea{width:100%;padding:13px;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:#0b1224;color:#fff}table{width:100%;border-collapse:collapse;background:rgba(0,0,0,.2);border-radius:18px;overflow:hidden}th,td{padding:12px;border-bottom:1px solid rgba(255,255,255,.1);text-align:left}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}.tab{padding:12px 18px;border-radius:999px;background:#111a2f;border:1px solid var(--border);color:#fff;font-weight:900;cursor:pointer}.tab.active{background:var(--blue);color:#00111f}.hidden{display:none}@media(max-width:800px){.row{grid-template-columns:1fr}}</style></head><body><div class="admin"><div class="login panel" id="login"><h1>Admin Login</h1><p>Use Admin PIN.</p><input id="pin" type="password" placeholder="Admin PIN"><br><br><button class="btn btn-blue" onclick="login()">Login</button><p id="err" style="color:#ff6b7f"></p></div><div id="app" class="hidden"><h1>Mega Wireless Control Center</h1><p class="meta">Manage website phones, plans, speakers, employees and POS inventory. Static version saves to this browser. Backend database is next phase.</p><div class="tabs"><button class="tab active" onclick="show('phones',this)">Phones</button><button class="tab" onclick="show('plans',this)">Carriers</button><button class="tab" onclick="show('speakers',this)">Speakers</button><button class="tab" onclick="show('employees',this)">Employees</button><button class="tab" onclick="show('inventory',this)">POS Inventory</button></div>
<section id="phones" class="panel sectionTab"><h2>Phone Deals</h2><div class="row"><input id="phName" placeholder="Phone name"><input id="phStorage" placeholder="Storage"><input id="phPrice" type="number" placeholder="Price"><input id="phStock" type="number" placeholder="Stock"></div><button class="btn btn-orange" onclick="addPhone()">Add Phone</button><div id="phonesTable"></div></section>
<section id="plans" class="panel sectionTab hidden"><h2>Carrier Plans</h2><div class="row"><input id="plCarrier" placeholder="Carrier"><input id="plPrice" placeholder="$10+"><input id="plDesc" placeholder="Description"><input id="plImage" placeholder="Image path"></div><button class="btn btn-orange" onclick="addPlan()">Add Carrier Plan</button><div id="plansTable"></div></section>
<section id="speakers" class="panel sectionTab hidden"><h2>Bluetooth Speakers</h2><div class="row"><input id="spName" placeholder="Speaker name"><input id="spPrice" type="number" placeholder="Price"><input id="spImage" placeholder="Image path"><input id="spTag" placeholder="Tag"></div><button class="btn btn-orange" onclick="addSpeaker()">Add Speaker</button><div id="speakersTable"></div></section>
<section id="employees" class="panel sectionTab hidden"><h2>Employees & Permissions</h2><div class="row"><input id="empName" placeholder="Employee name"><input id="empPin" placeholder="PIN"><select id="empRole"><option>Cashier</option><option>Manager</option><option>Admin</option></select><select id="empOverride"><option value="no">No price override below min</option><option value="yes">Can approve below min</option></select></div><button class="btn btn-orange" onclick="addEmployee()">Add Employee</button><div id="employeesTable"></div></section>
<section id="inventory" class="panel sectionTab hidden"><h2>POS Inventory</h2><div class="row"><input id="itName" placeholder="Item name"><input id="itCost" type="number" placeholder="Cost"><input id="itPrice" type="number" placeholder="Regular price"><input id="itMin" type="number" placeholder="Minimum price"><input id="itQty" type="number" placeholder="Qty"><input id="itCat" placeholder="Category"><input id="itSku" placeholder="SKU/Barcode"><select id="itWeb"><option value="no">POS only</option><option value="yes">Show on website</option></select></div><button class="btn btn-orange" onclick="addItem()">Add Inventory Item</button><div id="inventoryTable"></div></section>
</div></div><script src="assets/js/admin.js"></script></body></html>
