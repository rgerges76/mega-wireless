<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mega Wireless Admin</title><link rel="stylesheet" href="assets/css/style.css"><script defer src="assets/js/app.js"></script></head><body class="posbody"><div class="posbar"><b>MEGA WIRELESS ADMIN</b><div class="spacer"></div><a class="pill" href="index.html">Website</a><a class="pill" href="pos.html">POS</a></div><div class="adminbox"><h1>Admin Dashboard</h1><p>Full permissions. PIN 1234. Add products with cost, regular price, and minimum price.</p><div id="stats" class="grid"></div><h2>Add Product</h2><div class="formgrid"><input id="pn" placeholder="Product name"><input id="ps" placeholder="Spec"><select id="pcat"><option>Phones</option><option>Accessories</option><option>Repair</option><option>Speakers</option></select><input id="pqty" type="number" placeholder="Qty"><input id="pcost" type="number" step="0.01" placeholder="Cost price"><input id="pprice" type="number" step="0.01" placeholder="Regular price"><input id="pmin" type="number" step="0.01" placeholder="Minimum price"><label><input id="pfeat" type="checkbox"> Show on website</label></div><button class="btn blue" onclick="addProduct()">Add Product</button><h2>Products</h2><table width="100%"><thead><tr><th>Name</th><th>Category</th><th>Cost</th><th>Price</th><th>Minimum</th><th>Qty</th></tr></thead><tbody id="plist"></tbody></table><h2>Add Employee</h2><div class="emp"><input id="en" placeholder="Employee name"><select id="erole"><option>Cashier</option><option>Manager</option></select><input id="epin" placeholder="PIN"></div><p><label><input id="epermprice" type="checkbox" checked> Can change price above minimum</label> <label><input id="epermmin" type="checkbox"> Can approve below minimum</label> <label><input id="epermrefund" type="checkbox"> Can refund</label></p><button class="btn orange" onclick="addEmployee()">Add Employee</button></div></body></html>
