<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mega POS</title><link rel="stylesheet" href="assets/css/app.css"></head><body><div id="login" class="modal open"><div class="modal-card" style="max-width:420px"><h2>Employee Login</h2><input id="empPin" class="search" type="password"><br><br><button class="btn blue" onclick="loginNow()">Login</button></div></div><div class="pos"><main class="catalog"><div class="toolbar"><h1>Mega Wireless POS</h1><span id="employeeName"></span><a class="btn" href="admin.html">Admin</a></div><input id="search" class="search" placeholder="Search" oninput="renderProducts()"><div id="productList" class="product-list"></div></main><aside class="cart"><h2>Current Sale</h2><div id="cartLines"></div><div class="total" id="total">$0.00</div><button class="btn blue" onclick="checkout('Cash')">Cash</button> <button class="btn gold" onclick="checkout('Card')">Card</button></aside></div><script src="assets/js/store.js"></script><script>let data,user,cart=[];(async()=>{data=await MW.getData();renderProducts();renderCart()})();function loginNow(){user=data.employees.find(e=>e.pin===empPin.value);if(!user)return alert('Wrong PIN');employeeName.textContent=user.name;login.classList.remove('open')}function renderProducts(){const q=search.value.toLowerCase();productList.innerHTML=data.products.filter(p=>p.name.toLowerCase().includes(q)||p.barcode.includes(q)).map(p=>`<div class="pos-card" onclick="add('${p.id}')"><b>${p.name}</b><div class="price">${MW.money(p.price)}</div><div>Qty ${p.qty} · Min ${MW.money(p.minimum)}</div></div>`).join('')}function add(id){const p=data.products.find(x=>x.id===id);if(!p||p.qty<1)return;const l=cart.find(x=>x.id===id);if(l)l.qty++;else cart.push({...p,qty:1,sellPrice:p.price});renderCart()}function renderCart(){cartLines.innerHTML=cart.map((x,i)=>`<div class="cart-line"><div>${x.name} x${x.qty}</div><input value="${x.sellPrice}" onchange="priceChange(${i},this.value)"><button onclick="cart.splice(${i},1);renderCart()">×</button></div>`).join('');total.textContent=MW.money(cart.reduce((a,x)=>a+x.qty*x.sellPrice,0)*1.0925)}function priceChange(i,v){v=Number(v);const x=cart[i];if(v<x.minimum){const pin=prompt('Admin PIN');if(pin!==data.employees.find(e=>e.role==='admin').pin)return renderCart()}x.sellPrice=v;renderCart()}function checkout(method){if(!user||!cart.length)return alert('Login and add items');const last4=method==='Card'?prompt('Last 4 digits')||'':'';const sub=cart.reduce((a,x)=>a+x.qty*x.sellPrice,0),tax=sub*.0925,tot=sub+tax;cart.forEach(x=>data.products.find(p=>p.id===x.id).qty-=x.qty);MW.saveData(data);const w=window.open('');w.document.write(`<h2>Mega Wireless</h2>${cart.map(x=>`<div>${x.qty}x ${x.name} ${MW.money(x.qty*x.sellPrice)}</div>`).join('')}<hr>Total ${MW.money(tot)}<br>${method} ${last4}`);w.print();cart=[];renderCart();renderProducts()}</script></body></html>
