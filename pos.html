<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mega Wireless POS</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/css/style.css"></head><body class="pos-body"><div class="pos-shell"><main class="pos-main"><div class="pos-top"><b>MEGA WIRELESS POS</b><label><input id="taxToggle" type="checkbox" checked onchange="renderCart()"> Tax</label><a class="pill" href="admin.html">Admin</a><a class="pill" href="index.html">Website</a></div><input class="pos-search" placeholder="Search / barcode / IMEI" oninput="filterProducts(this.value)"><div class="tabs"><button onclick="filterProducts('')">All</button><button onclick="filterProducts('Accessories')">Accessories</button><button onclick="filterProducts('Phones')">Phones</button><button onclick="filterProducts('Repair')">Repair</button><button onclick="filterProducts('SIM')">SIM Cards</button></div><div id="productGrid" class="grid-products"></div></main><aside class="pos-side"><h2>Current Sale</h2><div id="cart"></div><p>Subtotal: <b id="subtotal">$0.00</b></p><p>Tax: <b id="tax">$0.00</b></p><h2>Total: <span id="total">$0.00</span></h2><div class="pay-row"><button class="btn btn-blue" onclick="pay('cash')">Cash + Print</button><button class="btn btn-gold" onclick="pay('card')">Card + Print</button></div><div class="admin-card" style="margin-top:18px"><h3>Daily Report</h3><div id="report"></div></div><div class="admin-card"><h3>Low Stock</h3><div id="lowStock"></div></div></aside></div><script src="assets/js/pos.js"></script></body></html>
