<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mega Wireless POS</title><link rel="stylesheet" href="assets/css/styles.css"></head><body class="app-page" onload="posInit()"><div class="app-top"><div class="app-logo">MEGA WIRELESS POS</div><div class="spacer"></div><label><input type="checkbox" checked onchange="taxOn=this.checked;renderCart()"> Tax</label><a class="app-btn gray" href="admin.html">Admin</a><a class="app-btn gray" href="index.html">Website</a></div><main class="pos-layout"><section class="pos-main"><input id="search" class="search" placeholder="Search / barcode / IMEI"><div id="cats" class="catbar"></div><div id="products" class="prod-grid"></div></section><aside class="side"><h2>Current Sale</h2><div id="cart" class="cart-items"></div><div class="totals"><div><span>Subtotal</span><b id="sub">$0.00</b></div><div><span>Tax</span><b id="tax">$0.00</b></div><div class="total"><span>Total</span><b id="total">$0.00</b></div></div><div class="pay-grid"><button class="app-btn blue" onclick="checkout('Cash')">Cash</button><button class="app-btn orange" onclick="checkout('Card')">Card</button></div><button class="app-btn gray" style="width:100%;margin-top:10px" onclick="cart=[];renderCart()">Clear Sale</button></aside></main><script src="assets/js/app.js"></script></body></html>
