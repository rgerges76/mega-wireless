<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mega Wireless POS Pro</title><link rel="stylesheet" href="assets/css/pos-v4.css?v=4.0.2"></head><body>
<header><b>MEGA WIRELESS POS</b><nav><button data-tab="pos" class="active">POS</button><button data-tab="inventory">Inventory</button><button data-tab="employees">Employees</button><button data-tab="reports">Reports</button><button onclick="adminLogin()">Admin Login</button><label><input type="checkbox" id="taxOn" checked> Tax</label></nav></header>
<main>
<section id="pos" class="tab active"><div class="posLayout"><div><input id="search" placeholder="Search / barcode / IMEI" oninput="renderProducts()"><div id="productGrid" class="grid"></div></div><aside class="sale"><h2>Current Sale</h2><div id="cart"></div><div class="totals"><p>Subtotal <b id="sub">$0.00</b></p><p>Tax <b id="tax">$0.00</b></p><h3>Total <b id="total">$0.00</b></h3></div><button onclick="checkout('Cash')">Cash</button><button onclick="checkout('Card')">Card</button><button onclick="printReceipt()">Print Receipt</button><button onclick="cart=[];renderCart()">Clear</button></aside></div></section>
<section id="inventory" class="tab"><h1>Inventory</h1><form id="prodForm" class="form" onsubmit="saveProduct(event)"><input name="name" placeholder="Product name" required><input name="sku" placeholder="SKU / Barcode"><input name="category" placeholder="Category"><input name="cost" type="number" step=".01" placeholder="Cost price"><input name="price" type="number" step=".01" placeholder="Regular price" required><input name="min" type="number" step=".01" placeholder="Minimum price" required><input name="qty" type="number" placeholder="Quantity" required><button>Save product</button></form><table id="invTable"></table></section>
<section id="employees" class="tab"><h1>Employees & Permissions</h1><form id="empForm" class="form" onsubmit="saveEmployee(event)"><input name="name" placeholder="Employee name" required><input name="pin" placeholder="PIN" required><select name="role"><option>Cashier</option><option>Manager</option><option>Admin</option></select><label><input name="priceOverride" type="checkbox"> Can change price above minimum</label><label><input name="belowMinimum" type="checkbox"> Can approve below minimum</label><label><input name="reports" type="checkbox"> Can view reports</label><button>Add employee</button></form><table id="empTable"></table></section>
<section id="reports" class="tab"><h1>Reports</h1><div class="cards"><article><span>Today Sales</span><b id="rSales">$0.00</b></article><article><span>Today Profit</span><b id="rProfit">$0.00</b></article><article><span>Discounts</span><b id="rDiscounts">$0.00</b></article><article><span>Invoices</span><b id="rInvoices">0</b></article></div><table id="salesTable"></table></section>
</main><script src="assets/js/pos-v4.js?v=4.0.2"></script></body></html>
