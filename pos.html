<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mega Wireless POS</title><link rel="stylesheet" href="assets/css/style.css"><style>body{background:#f4f7fb;color:#111}.posbar{height:64px;background:#050914;color:white;display:flex;align-items:center;justify-content:space-between;padding:0 16px}.pos{display:grid;grid-template-columns:1fr 360px;gap:16px;padding:16px}.panel{background:white;border:1px solid #dce3ee;border-radius:18px;padding:16px;box-shadow:0 10px 35px rgba(0,0,0,.08)}input,select{width:100%;padding:12px;border:1px solid #cfd8e6;border-radius:12px}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:14px}.item{background:#fff;border:1px solid #dce3ee;border-radius:16px;padding:14px;cursor:pointer;min-height:120px;box-shadow:0 8px 22px rgba(0,0,0,.06)}.item:hover{border-color:#20b7ff;transform:translateY(-3px)}.item .p{font-size:22px;font-weight:1000;color:#0b68c7}.cartline{display:grid;grid-template-columns:1fr 70px 80px 28px;gap:8px;align-items:center;border-bottom:1px solid #e6edf5;padding:10px 0}.totals{font-size:20px;font-weight:900}.paybtn{padding:14px;border:0;border-radius:14px;color:white;font-weight:1000}.cash{background:#1177e8}.card{background:#f28b2e}.danger{background:#e33}.tools{display:flex;gap:8px;flex-wrap:wrap}.tools button{padding:10px 12px;border-radius:12px;border:0;background:#0b1224;color:white;font-weight:900}.badge{display:inline-block;padding:5px 9px;border-radius:999px;background:#e8f5ff;color:#0b68c7;font-weight:900;font-size:12px}.low{background:#fff1f1;color:#c00}.login{max-width:420px;margin:80px auto}.hidden{display:none}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #e5eaf1;padding:8px;text-align:left}@media(max-width:1000px){.pos{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}}@media print{body>*:not(#receipt){display:none!important}#receipt{display:block!important;color:#000;font-family:monospace;width:280px}#receipt h2{text-align:center}}</style></head><body><div id="login" class="login panel"><h1>Mega Wireless POS</h1><input id="pin" type="password" placeholder="Employee PIN"><br><br><button class="btn btn-blue" onclick="login()">Login</button><p id="err" style="color:red"></p></div><div id="app" class="hidden"><div class="posbar"><strong>MEGA WIRELESS POS</strong><div><span id="who"></span> <label><input id="taxToggle" type="checkbox" checked> Tax</label> <a style="color:white" href="admin.html">Admin</a></div></div><div class="pos"><main><div class="panel"><input id="search" placeholder="Search / barcode / IMEI" oninput="renderItems()"><div class="tools"><button onclick="setCat('All')">All</button><button onclick="setCat('Phones')">Phones</button><button onclick="setCat('Accessories')">Accessories</button><button onclick="setCat('Speakers')">Speakers</button><button onclick="setCat('Repair')">Repair</button><button onclick="openInventory()">Inventory</button><button onclick="openReports()">Reports</button><button onclick="openEmployees()">Employees</button></div><div id="items" class="grid"></div></div><div id="inventoryPanel" class="panel hidden"><h2>Add Inventory</h2><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px"><input id="n" placeholder="Name"><input id="c" type="number" placeholder="Cost"><input id="p" type="number" placeholder="Price"><input id="m" type="number" placeholder="Minimum"><input id="q" type="number" placeholder="Qty"><input id="cat" placeholder="Category"><input id="sku" placeholder="SKU"><button class="btn btn-orange" onclick="addInv()">Add</button></div><div id="invList"></div></div><div id="reportsPanel" class="panel hidden"><h2>Reports</h2><div id="reports"></div></div><div id="employeesPanel" class="panel hidden"><h2>Employees</h2><p>Add employees from Admin page. Current users below.</p><div id="empList"></div></div></main><aside class="panel"><h2>Current Sale</h2><div id="cart"></div><hr><p>Subtotal: <b id="sub">$0.00</b></p><p>Tax: <b id="tax">$0.00</b></p><p class="totals">Total: <b id="total">$0.00</b></p><input id="customer" placeholder="Customer phone/name"><br><br><button class="paybtn cash" onclick="checkout('Cash')">Cash</button> <button class="paybtn card" onclick="cardPay()">Card</button><br><br><button class="paybtn danger" onclick="cart=[];renderCart()">Clear</button></aside></div></div><div id="receipt" class="hidden"></div><script src="assets/js/pos.js"></script></body></html>
