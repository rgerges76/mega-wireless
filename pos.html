<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mega Wireless POS</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/css/app.css"></head><body class="pos-body" onload="initPOS()"><div class="appbar"><b>MEGA WIRELESS POS</b><div><label><input id="taxOn" type="checkbox" checked onchange="drawCart()"> Tax</label> <button class="pillbtn" onclick="location.href='admin.html'">Admin</button></div></div><div class="main"><div class="posgrid"><div><input class="inp" placeholder="Search / barcode / IMEI" oninput="let q=this.value.toLowerCase();document.querySelectorAll('.prod').forEach(p=>p.style.display=p.textContent.toLowerCase().includes(q)?'block':'none')"><br><br><div class="productgrid" id="products"></div></div><div class="cart"><h2>Current Sale</h2><div id="cart"></div><button class="btn blue" onclick="checkout('Cash')">Cash</button> <button class="btn gold" onclick="checkout('Card')">Card</button></div></div></div><script src="assets/js/app.js"></script></body></html>
